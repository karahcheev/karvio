site_name: Karvio Documentation
site_description: Self-hosted test management system for QA teams
site_url: https://karahcheev.github.io/karvio
repo_url: https://github.com/karahcheev/karvio
repo_name: karahcheev/karvio

extra_css:
  - stylesheets/extra.css

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.indexes
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

exclude_docs: |
  _site/**

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
      - Key Concepts: getting-started/concepts.md
  - Glossary & Style Guide: user-guide/glossary-style-guide.md
  - Role & Permissions: user-guide/permissions.md
  - Release Scope:
